version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      react:
        patterns:
          - react
          - react-dom
          - react-*
      vite:
        patterns:
          - vite
          - "@vitejs/*"
